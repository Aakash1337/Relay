# RELAY — containerized single-host deployment.
#
#   cp .env.example .env        # then set real values (docs/deployment.md)
#   export POSTGRES_PASSWORD=…  RELAY_APP_DB_PASSWORD=…
#   docker compose -f docker-compose.prod.yml up -d --build
#
# With the SQS event poller (real mail + SQS return path):
#   docker compose -f docker-compose.prod.yml --profile ses up -d --build
#
# This maps the topology in docs/deployment.md onto containers: Postgres,
# a one-shot migration, the API, and looping workers. The database URLs are
# overridden here to point at the `postgres` service; everything else comes
# from your .env. The API listens on 127.0.0.1:8000 — put your TLS reverse
# proxy in front of it; nothing else is exposed.
#
# The dev stack stays in docker-compose.yml; this file never runs Mailpit
# or a throwaway database.

x-relay: &relay
  build: .
  env_file: .env
  environment: &relay-env
    RELAY_DATABASE_URL: postgresql+psycopg://relay:${POSTGRES_PASSWORD:?export POSTGRES_PASSWORD}@postgres:5432/relay
    RELAY_APP_DATABASE_URL: postgresql+psycopg://relay_app:${RELAY_APP_DB_PASSWORD:?export RELAY_APP_DB_PASSWORD}@postgres:5432/relay
    RELAY_APP_DB_PASSWORD: ${RELAY_APP_DB_PASSWORD}
  depends_on:
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?export POSTGRES_PASSWORD}
      POSTGRES_DB: relay
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 5s
      timeout: 3s
      retries: 10
    # No ports: the database is reachable only inside the compose network.

  # Idempotent: schema evolution, triggers, RLS, transition-rule seeding.
  # Runs to completion before anything else starts; safe on every deploy.
  migrate:
    build: .
    command: relay-migrate
    env_file: .env
    environment: *relay-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *relay
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # The workers are one-shot commands by design; the loop IS the scheduler
  # here. Overlap with a slow pass is safe (FOR UPDATE SKIP LOCKED).
  send-worker:
    <<: *relay
    command: sh -c 'while true; do relay-worker --once --concurrency 4; sleep 300; done'

  # Only meaningful when SES events flow back via SQS (RELAY_SQS_QUEUE_URL).
  # If you use the SNS webhook instead, leave this profile off.
  event-poller:
    <<: *relay
    command: sh -c 'while true; do relay-events; sleep 300; done'
    profiles: ["ses"]

  retention:
    <<: *relay
    command: sh -c 'while true; do relay-retention; sleep 86400; done'

volumes:
  pgdata_prod:
