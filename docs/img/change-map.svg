<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555"/>
    </marker>
    <marker id="cBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c8ebf"/>
    </marker>
    <marker id="cYel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d6b656"/>
    </marker>
  </defs>

  <!-- start -->
  <rect x="384" y="16" width="192" height="46" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.5"/>
  <text x="480" y="44" text-anchor="middle" fill="#1a1a1a">I want to change something</text>

  <line x1="480" y1="62" x2="480" y2="86" stroke="#555555" stroke-width="1.5" marker-end="url(#c)"/>

  <!-- decision -->
  <polygon points="480,88 624,140 480,192 336,140" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="480" y="145" text-anchor="middle" fill="#1a1a1a">What kind of change?</text>

  <!-- branch B: behavior (the common case) -->
  <path d="M 336 140 L 190 140 L 190 214" stroke="#6c8ebf" stroke-width="2.5" fill="none" marker-end="url(#cBlue)"/>
  <text x="258" y="116" text-anchor="middle" fill="#1a1a1a" font-weight="bold">behavior &#8212; what a step does</text>
  <text x="258" y="132" text-anchor="middle" fill="#6c8ebf" font-size="11">most changes land here</text>

  <rect x="60" y="216" width="260" height="68" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="190" y="240" text-anchor="middle" fill="#1a1a1a">Python in src/relay/</text>
  <text x="190" y="257" text-anchor="middle" fill="#555555" font-size="11">gates, prompts, scoring, send logic,</text>
  <text x="190" y="271" text-anchor="middle" fill="#555555" font-size="11">enrichment &#8212; the product itself</text>

  <line x1="190" y1="284" x2="190" y2="312" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#cBlue)"/>

  <rect x="60" y="314" width="260" height="68" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="190" y="338" text-anchor="middle" fill="#1a1a1a">The development flow above</text>
  <text x="190" y="355" text-anchor="middle" fill="#555555" font-size="11">branch from main &#8594; code + tests &#8594;</text>
  <text x="190" y="369" text-anchor="middle" fill="#555555" font-size="11">suite on Postgres &#8594; PR &#8594; CI gate &#8594; merge</text>

  <!-- branch A: orchestration (the narrow case) -->
  <path d="M 624 140 L 780 140 L 780 186" stroke="#555555" stroke-width="1.5" fill="none" marker-end="url(#c)"/>
  <text x="712" y="116" text-anchor="middle" fill="#1a1a1a">orchestration &#8212; when / order / whether</text>
  <text x="712" y="132" text-anchor="middle" fill="#555555" font-size="11">reorder steps, add a delay, change a condition</text>

  <rect x="664" y="188" width="232" height="44" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.2"/>
  <text x="780" y="214" text-anchor="middle" fill="#1a1a1a">Edit visually in the n8n UI</text>

  <line x1="780" y1="232" x2="780" y2="248" stroke="#555555" stroke-width="1.5" marker-end="url(#c)"/>

  <rect x="664" y="250" width="232" height="44" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.2"/>
  <text x="780" y="276" text-anchor="middle" fill="#1a1a1a">Export the workflow JSON</text>

  <line x1="780" y1="294" x2="780" y2="310" stroke="#555555" stroke-width="1.5" marker-end="url(#c)"/>

  <rect x="664" y="312" width="232" height="44" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.2"/>
  <text x="780" y="330" text-anchor="middle" fill="#1a1a1a">Save over</text>
  <text x="780" y="346" text-anchor="middle" fill="#555555" font-size="12">infra/n8n/relay-spine.json</text>

  <line x1="780" y1="356" x2="780" y2="372" stroke="#555555" stroke-width="1.5" marker-end="url(#c)"/>

  <rect x="664" y="374" width="232" height="44" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.2"/>
  <text x="780" y="400" text-anchor="middle" fill="#1a1a1a">Commit to git</text>

  <!-- manual-loop warning -->
  <rect x="372" y="300" width="246" height="74" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="495" y="322" text-anchor="middle" fill="#1a1a1a">This round trip is manual</text>
  <text x="495" y="339" text-anchor="middle" fill="#555555" font-size="11">nothing syncs n8n to git on its own &#8212;</text>
  <text x="495" y="353" text-anchor="middle" fill="#555555" font-size="11">skip the export and your change</text>
  <text x="495" y="367" text-anchor="middle" fill="#555555" font-size="11">exists only inside the n8n UI</text>

  <line x1="618" y1="337" x2="662" y2="337" stroke="#d6b656" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#cYel)"/>

  <!-- runtime caption -->
  <rect x="16" y="444" width="928" height="44" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.5"/>
  <text x="480" y="463" text-anchor="middle" fill="#333333">The two layers only meet at runtime: the n8n spine calls the API's tick endpoints on a timer,</text>
  <text x="480" y="479" text-anchor="middle" fill="#333333">and the Python behind those endpoints decides everything that actually happens.</text>
</svg>
