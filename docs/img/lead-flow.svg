<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b85450"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c8ebf"/>
    </marker>
  </defs>

  <!-- main lane -->
  <rect x="16" y="40" width="104" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="68" y="63" text-anchor="middle" fill="#1a1a1a">New lead</text>
  <text x="68" y="80" text-anchor="middle" fill="#555555" font-size="11">source + consent</text>

  <rect x="150" y="40" width="110" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="205" y="63" text-anchor="middle" fill="#1a1a1a">Verify + score</text>
  <text x="205" y="80" text-anchor="middle" fill="#555555" font-size="11">model, cheap tier</text>

  <rect x="290" y="40" width="110" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="345" y="63" text-anchor="middle" fill="#1a1a1a">Draft email</text>
  <text x="345" y="80" text-anchor="middle" fill="#555555" font-size="11">model writes v1</text>

  <rect x="430" y="40" width="116" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="488" y="63" text-anchor="middle" fill="#1a1a1a">Human review</text>
  <text x="488" y="80" text-anchor="middle" fill="#555555" font-size="11">approve exact text</text>

  <rect x="576" y="40" width="116" height="56" rx="8" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="634" y="63" text-anchor="middle" fill="#1a1a1a">Send gate</text>
  <text x="634" y="80" text-anchor="middle" fill="#555555" font-size="11">17 checks, code + DB</text>

  <rect x="722" y="40" width="110" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="777" y="63" text-anchor="middle" fill="#1a1a1a">Send worker</text>
  <text x="777" y="80" text-anchor="middle" fill="#555555" font-size="11">rechecks, then SES</text>

  <rect x="862" y="40" width="80" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="902" y="73" text-anchor="middle" fill="#1a1a1a">Sent</text>

  <!-- main lane arrows -->
  <line x1="120" y1="68" x2="148" y2="68" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="260" y1="68" x2="288" y2="68" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="68" x2="428" y2="68" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="546" y1="68" x2="574" y2="68" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="692" y1="68" x2="720" y2="68" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="832" y1="68" x2="860" y2="68" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- reject / block branches -->
  <rect x="430" y="150" width="116" height="42" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="488" y="176" text-anchor="middle" fill="#1a1a1a">rejected</text>
  <line x1="488" y1="96" x2="488" y2="148" stroke="#b85450" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <rect x="576" y="150" width="116" height="42" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="634" y="170" text-anchor="middle" fill="#1a1a1a">blocked</text>
  <text x="634" y="185" text-anchor="middle" fill="#555555" font-size="11">reason recorded</text>
  <line x1="634" y1="96" x2="634" y2="148" stroke="#b85450" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <!-- after send: three outcomes -->
  <rect x="640" y="240" width="150" height="56" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="715" y="263" text-anchor="middle" fill="#1a1a1a">Reply comes in</text>
  <text x="715" y="280" text-anchor="middle" fill="#555555" font-size="11">triage &#8594; meeting booked</text>

  <rect x="330" y="240" width="270" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="465" y="263" text-anchor="middle" fill="#1a1a1a">No reply after the wait</text>
  <text x="465" y="280" text-anchor="middle" fill="#555555" font-size="11">next follow-up drafts, gets its own approval</text>

  <rect x="820" y="240" width="124" height="56" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="882" y="258" text-anchor="middle" fill="#1a1a1a">Bounce,</text>
  <text x="882" y="273" text-anchor="middle" fill="#1a1a1a">complaint, or</text>
  <text x="882" y="288" text-anchor="middle" fill="#1a1a1a">unsubscribe</text>

  <path d="M 902 96 L 902 238" stroke="#555555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 880 96 L 880 205 L 715 205 L 715 238" stroke="#555555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 868 96 L 868 220 L 465 220 L 465 238" stroke="#555555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- follow-up loops back to draft -->
  <path d="M 330 268 L 312 268 L 312 100" stroke="#6c8ebf" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>

  <!-- suppression -->
  <rect x="660" y="330" width="284" height="46" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="802" y="349" text-anchor="middle" fill="#1a1a1a">Suppression list</text>
  <text x="802" y="365" text-anchor="middle" fill="#555555" font-size="11">written automatically, permanent</text>
  <line x1="882" y1="296" x2="882" y2="328" stroke="#b85450" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <path d="M 660 353 L 610 353 L 610 196" stroke="#b85450" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrRed)"/>
  <text x="602" y="330" text-anchor="end" fill="#b85450" font-size="11">blocks every future send</text>

  <!-- enforcement floor -->
  <rect x="16" y="410" width="928" height="44" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.5"/>
  <text x="480" y="429" text-anchor="middle" fill="#333333">PostgreSQL underneath everything: the state machine, tenant isolation, suppression and</text>
  <text x="480" y="445" text-anchor="middle" fill="#333333">duplicate protection are triggers and constraints, so they hold even against buggy code or raw SQL</text>
</svg>
