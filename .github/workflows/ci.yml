name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
          POSTGRES_DB: relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relay -d relay_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      RELAY_DATABASE_URL: postgresql+psycopg://relay:relay@localhost:5432/relay_test
      RELAY_APP_DATABASE_URL: postgresql+psycopg://relay_app:relay_app@localhost:5432/relay_test
      RELAY_APP_DB_PASSWORD: relay_app

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run tests (Phase 0 exit gate)
        run: uv run pytest tests/ -v --tb=short

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the application image
        run: docker build -t relay:ci .

      - name: Image smoke test (app imports, entrypoints resolve)
        run: |
          docker run --rm relay:ci python -c "import relay.api.app, relay.workers.send_worker, relay.workers.event_worker, relay.workers.retention_worker, relay.db.migrate; print('imports ok')"
          docker run --rm relay:ci relay-worker --help
          docker run --rm relay:ci uvicorn --version

  deploy-config:
    runs-on: ubuntu-latest
    env:
      # Dummies so the compose files' required-variable checks pass validation.
      RELAY_DATABASE_URL: postgresql+psycopg://x:x@db:5432/relay
      RELAY_APP_DATABASE_URL: postgresql+psycopg://y:y@db:5432/relay
      RELAY_APP_DB_PASSWORD: x
      RELAY_ADMIN_TOKEN: x
      RELAY_MASTER_KEY: x
      RELAY_EMAIL_HASH_PEPPER: x
      TUNNEL_TOKEN: x
      POSTGRES_PASSWORD: x
    steps:
      - uses: actions/checkout@v4

      - name: Validate production compose
        run: |
          docker compose -f deploy/docker-compose.prod.yml --profile tunnel config --quiet
          docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.local-db.yml config --quiet

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.*"
          terraform_wrapper: false

      - name: Terraform fmt + validate (deploy/gcp)
        working-directory: deploy/gcp
        run: |
          terraform fmt -check -diff
          terraform init -backend=false -input=false
          terraform validate

      - name: Terraform fmt + validate (deploy/aws)
        working-directory: deploy/aws
        run: |
          terraform fmt -check -diff
          terraform init -backend=false -input=false
          terraform validate

      - name: Render the startup template (catches template syntax errors)
        working-directory: deploy/gcp
        run: |
          echo 'templatefile("startup.sh.tpl", { project_id = "p", registry_host = "r", image = "i", db_host = "10.0.0.1", enable_tunnel = true, app_env = { A = "b" }, compose_yaml = file("../docker-compose.prod.yml") })' \
            | terraform console > /dev/null
          echo "template renders"
